{% extends 'main.html' %}
{% block content %}
<style>
    .ai-risk-card {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        border: none;
    }

    .risk-bar {
        width: 100%;
        height: 18px;
        border-radius: 50px;
        background: #e9ecef;
        overflow: hidden;
        margin-top: 10px;
    }

    .risk-fill {
        height: 100%;
        width: 0;
        transition: width 1s ease-out;
    }

    .risk-fill.low {
        background: #28a745;
    }

    .risk-fill.moderate {
        background: #ffc107;
    }

    .risk-fill.high {
        background: #dc3545;
    }
</style>

<div class="row" style="margin-bottom: 260px;">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <div class="card ai-risk-card">
            <div class="card-body text-center">
                <h3 class="mb-4">AI Health Risk Analysis</h3>

                <p class="lead mb-1">
                    Risk Percentage:
                    <strong>{{ risk_percentage }}&#37;</strong>
                </p>
                <p class="lead">
                    Risk Level:
                    <strong>{{ risk_level }}</strong>
                </p>

                <div class="risk-bar">
                    <div
                        id="risk-fill"
                        class="risk-fill {{ risk_class }}"
                        data-percentage="{{ risk_percentage }}"
                    ></div>
                </div>

                <p class="mt-3 text-muted small">
                    This AI system provides predictive risk analysis and should not replace professional medical advice.
                </p>

                <a href="{{ url_for('home') }}" class="btn btn-primary mt-3">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
    <div class="col-md-3"></div>
</div>

<script>
    window.addEventListener('load', function () {
        var fill = document.getElementById('risk-fill');
        if (fill) {
            var pct = parseFloat(fill.getAttribute('data-percentage')) || 0;
            fill.style.width = pct + '%';
        }
    });
</script>
{% endblock %}
